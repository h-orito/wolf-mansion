version: "3.8"

services:
  mysql:
    image: mysql:5.7
    container_name: wolf-mansion-mysql
    ports:
      - "4306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: werewolf_mansiondb
      MYSQL_USER: wmansion
      MYSQL_PASSWORD: wmans10n
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_general_ci
    volumes:
      - wolf-mansion-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  dbflute-init:
    image: eclipse-temurin:11-jdk
    container_name: wolf-mansion-dbflute-init
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - .:/work
    working_dir: /work
    entrypoint: ["bash", "/work/docker/dbflute-init.sh"]
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"

volumes:
  wolf-mansion-mysql-data:
